name: ios-testapp-release

on:
  workflow_dispatch:
    inputs:
      bootstrap_signing:
        description: Generate and store new TestFlight signing assets
        type: boolean
        default: false
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-signing:
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_signing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate repository secrets token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MAPLIBRE_NATIVE_BOT_APP_ID }}
          private-key: ${{ secrets.MAPLIBRE_NATIVE_BOT_PRIVATE_KEY }}
          permission-secrets: write

      - name: Generate and store TestFlight signing assets
        shell: bash
        env:
          APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          IOS_BUNDLE_ID_PREFIX: ${{ vars.IOS_BUNDLE_ID_PREFIX }}
          IOS_BUNDLE_IDENTIFIER: org.maplibre.maplibre.app
          IOS_CERTIFICATE_TYPE: DISTRIBUTION
          IOS_PROFILE_TYPE: IOS_APP_STORE
          IOS_CERTIFICATE_NAME: MapLibre TestFlight CI
          IOS_PROFILE_NAME: MapLibre TestFlight App Store
        run: |
          set -euo pipefail
          assets_dir="$RUNNER_TEMP/testflight-signing"
          export IOS_CI_OUTPUT_DIR="$assets_dir"

          platform/ios/scripts/ios-ci-create-signing-assets.sh

          base64 -w 0 "$assets_dir/certificate.p12" |
            gh secret set IOS_DISTRIBUTION_CERTIFICATE --repo "$GITHUB_REPOSITORY"
          base64 -w 0 "$assets_dir/profile.mobileprovision" |
            gh secret set IOS_PROVISIONING_PROFILE --repo "$GITHUB_REPOSITORY"
          gh secret set IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(cat "$assets_dir/p12-password")"

          rm -rf "$assets_dir"

  ios-testapp-release:
    if: github.event_name == 'pull_request' || inputs.bootstrap_signing != true
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Install Apple signing assets
        run: platform/ios/scripts/ios-ci-install-signing-assets.sh
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_BUNDLE_ID_PREFIX: ${{ vars.IOS_BUNDLE_ID_PREFIX }}

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          build_number="$(date +%s)"
          bazel build //platform/ios/app-swift:MapLibreApp \
            --compilation_mode=opt \
            --ios_multi_cpus=arm64 \
            --//:renderer=metal \
            --action_env=SENTRY_DSN="${{ vars.SENTRY_DSN_IOS }}" \
            --embed_label="maplibre_app_1.0_build_${build_number}"
          test -f bazel-bin/platform/ios/app-swift/MapLibreApp.ipa

      - name: Upload app to TestFlight
        uses: apple-actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5.2.1
        with:
          app-path: bazel-bin/platform/ios/app-swift/MapLibreApp.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          wait-for-processing: 'true'
