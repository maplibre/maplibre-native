name: terrain-render-test

# On-demand macOS/Metal render tests scoped to a single filter (default: the
# terrain tests). Much faster than the full node-ci render-test suite - it builds
# only mbgl-render-test-runner and runs the matching tests - and always uploads
# the HTML diff report plus the actual/diff PNGs, so a failing terrain render can
# be inspected without digging through the whole suite. Trigger it from the
# Actions tab ("Run workflow"); set "update" to rewrite the expected.png baselines
# from this build's native render.

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Test path regex to run (passed to --filter)"
        required: false
        default: "terrain"
      update:
        description: "Rewrite expected.png baselines from this render (--update default)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  terrain-render-test:
    runs-on: macos-15
    env:
      BUILDTYPE: "Release"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install dependencies (macOS)
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew list ccache || brew install ccache
          brew list ninja || brew install ninja
          brew list pkg-config || brew install pkg-config
          brew list glfw || brew install glfw
          brew list libuv || brew install libuv

      - name: Use Node.js from nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'platform/node/.nvmrc'

      - name: npm ci
        working-directory: platform/node
        run: npm ci --ignore-scripts

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: macos-15-arm64-${{ env.BUILDTYPE }}-terrain-render-test
          restore-keys: |
            macos-15-arm64-${{ env.BUILDTYPE }}-terrain-render-test
            macos-15-arm64-${{ env.BUILDTYPE }}-node-ci

      - name: Configure maplibre-native (macOS Metal)
        run: cmake --preset macos-metal-node -DCMAKE_BUILD_TYPE=${{ env.BUILDTYPE }}

      - name: Build mbgl-render-test-runner
        run: cmake --build build --target mbgl-render-test-runner -j "$(sysctl -n hw.ncpu)"

      - name: Run terrain render tests
        id: render_tests
        continue-on-error: true
        run: |
          UPDATE_FLAG=""
          if [ "${{ inputs.update }}" = "true" ]; then
            UPDATE_FLAG="--update default"
          fi
          ./build/mbgl-render-test-runner \
            --manifestPath metrics/macos-xcode11-release-style.json \
            --filter "${{ inputs.filter }}" \
            $UPDATE_FLAG

      - name: Upload render test report and images
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terrain-render-test-results
          if-no-files-found: warn
          path: |
            metrics/macos-xcode11-release-style.html
            metrics/integration/render-tests/terrain/**/*.png

      - name: Fail if render tests failed (skipped when updating baselines)
        if: steps.render_tests.outcome == 'failure' && inputs.update != true
        run: exit 1
