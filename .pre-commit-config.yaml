repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    - id: check-yaml
      args: [--allow-multiple-documents, --unsafe]
    - id: end-of-file-fixer
    - id: trailing-whitespace
      # FIXME: these autogenerate files contain trailing whitespace. Need to fix generator.
      exclude: 'platform/android/MapLibreAndroid/src/main/java/org/maplibre/android/(location/LocationIndicatorLayer|style/layers/PropertyFactory)\.java'
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v19.1.4
  hooks:
  - id: clang-format
    files: '.*\.(hpp|cpp|h)'
    exclude: '(vendor/.*|darwin/include/mbgl/storage/reachability.h)'
- repo: https://github.com/keith/pre-commit-buildifier
  rev: 7.3.1
  hooks:
    - id: buildifier
- repo: https://github.com/Mateusz-Grzelinski/actionlint-py
  rev: v1.7.4.20
  hooks:
    - id: actionlint
      additional_dependencies: [shellcheck-py]
- repo: https://github.com/nicklockwood/SwiftFormat
  rev: "0.55.3"
  hooks:
    - id: swiftformat
      args: [--swiftversion, "5.8"]
-   repo: local
    hooks:
    -   id: rustfmt_utils
        name: rustfmt rustutils
        entry: bash -c 'cd rustutils && cargo fmt' --
        language: rust
        types: [rust]
    -   id: rustfmt_platform
        name: rustfmt rust platform
        entry: bash -c 'cd platform/rust && cargo fmt' --
        language: rust
        types: [rust]
ci:
  # sometimes fails https://github.com/keith/pre-commit-buildifier/issues/13
  skip: [buildifier]
  autoupdate_schedule: monthly
